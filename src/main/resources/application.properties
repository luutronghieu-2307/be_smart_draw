spring.application.name=doan

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.api-docs.groups.enabled=true
springdoc.show-actuator=true

# Server Configuration
server.port=8080
server.servlet.context-path=/

# MQTT Configuration
mqtt.broker.url=tcp://mqtt-broker:1883
mqtt.broker.clientId=spring-boot-client
mqtt.broker.username=
mqtt.broker.password=

# MediaMTX Configuration
mediamtx.rtsp.url=rtsp://mediamtx:8554
mediamtx.http.url=http://mediamtx:8888

# AI Model Configuration
ai.model.path=src/main/resources/models/yolov8n.onnx
ai.model.input.width=640
ai.model.input.height=640
ai.model.confidence.threshold=0.5
ai.model.iou.threshold=0.45

# Logging
logging.level.luutronghieu.doan=DEBUG
logging.level.ai.djl=INFO
